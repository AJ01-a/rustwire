# Netlify configuration for TechPulse — a static site, no build step required.

[build]
  publish = "."
  command = "echo 'No build step — static files only.'"

# ----------------------------------------------------------------------------
# Cache-Control
# ----------------------------------------------------------------------------

# Live data must never be cached.
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Static assets are content-addressed by deploy hash on Netlify's CDN, so
# the URL changes whenever the underlying file changes.  Safe to cache forever.
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ----------------------------------------------------------------------------
# Security headers — applied to every response
# ----------------------------------------------------------------------------
#
# Defenses configured below (and what they mitigate):
#
#   Content-Security-Policy
#       The big one.  Prevents XSS by whitelisting where scripts, styles,
#       fonts, images, and network calls may originate from.  'self' covers
#       our own assets; Google Fonts is the only third-party allowed.
#       'unsafe-inline' is required on style-src because app.js sets
#       per-category accent colors via inline `style="--cat-color:#..."`;
#       those values are validated against a hex-only regex (safeColor)
#       before being interpolated, so CSS injection is closed off in code.
#
#   Strict-Transport-Security
#       Forces HTTPS for the next two years on this domain and any subdomain.
#       Eliminates downgrade attacks.  `preload` opts into the browser's
#       HSTS preload list (requires manual submission at hstspreload.org).
#
#   X-Frame-Options + frame-ancestors
#       Prevents clickjacking by forbidding the site from being framed.
#
#   X-Content-Type-Options
#       Disables browser MIME-sniffing — a script served as text/plain is
#       not executed as JavaScript.
#
#   Referrer-Policy
#       Don't leak path / query when navigating to other origins.
#
#   Permissions-Policy
#       Disables every browser feature we don't use (camera, mic, geo,
#       payment, etc.) so a future XSS can't pivot to using them.
#
#   Cross-Origin-Resource-Policy
#       Stops other sites from embedding our static assets cross-origin.
#
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'none'; object-src 'none'; upgrade-insecure-requests"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options    = "nosniff"
    X-Frame-Options           = "DENY"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()"
    Cross-Origin-Resource-Policy = "same-origin"
    X-DNS-Prefetch-Control    = "off"
