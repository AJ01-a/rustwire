name: Refresh Rustwire feed

on:
  schedule:
    # Every 6 hours, on the hour, UTC.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/update.yml"

# Allow the workflow to push commits back to the repo.
permissions:
  contents: write

# Opt JavaScript-based actions into Node.js 24 ahead of the June 2026 forced
# upgrade. Avoids the Node 20 deprecation warning on actions/checkout and
# actions/setup-python without having to chase action version bumps.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: rustwire-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m scripts.main

      - name: Commit updated feed
        run: |
          git config user.name  "rustwire-bot"
          git config user.email "rustwire-bot@users.noreply.github.com"
          if git diff --quiet -- data/feed.json; then
            echo "No changes to commit."
            exit 0
          fi
          git add data/feed.json
          git commit -m "chore(data): refresh feed [skip ci]"
          git push
