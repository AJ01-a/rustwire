name: Refresh Rustwire feed & deploy

on:
  schedule:
    # Every 6 hours, on the hour, UTC.
    - cron: "0 */6 * * *"
  push:
    branches: [main]
  workflow_dispatch: {}

# contents: write  — commit the refreshed feed back to the repo.
# pages/id-token   — deploy to GitHub Pages via OIDC.
permissions:
  contents: write
  pages: write
  id-token: write

# Opt JavaScript-based actions into Node.js 24 ahead of the June 2026 forced
# upgrade. Avoids the Node 20 deprecation warning on actions/checkout and
# actions/setup-python without having to chase action version bumps.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Queue runs instead of cancelling: a cron refresh and a user push must both
# complete, in order, or the feed commit / deploy could be lost.
concurrency:
  group: rustwire-refresh
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Branch tip, not the trigger SHA — a queued cron run must build on
          # top of any commits that landed while it waited.
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m scripts.main

      - name: Commit updated feed
        run: |
          git config user.name  "rustwire-bot"
          git config user.email "rustwire-bot@users.noreply.github.com"
          if git diff --quiet -- data/feed.json; then
            echo "No changes to commit."
            exit 0
          fi
          git add data/feed.json
          git commit -m "chore(data): refresh feed"
          # Rebase in case a user push landed mid-run, then push with one retry.
          git pull --rebase origin main
          git push origin main || (git pull --rebase origin main && git push origin main)

      - name: Stage site
        run: |
          mkdir -p _site/data
          cp index.html styles.css app.js theme.js favicon.svg _site/
          cp data/feed.json _site/data/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
